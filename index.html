<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolbox Meeting Digital</title>

  <link rel="stylesheet" href="style.css">

  <!-- jsPDF -->
  <script src="jspdf.umd.min.js"></script>

  <!-- PDF JS -->
  <script src="pdf.min.js"></script>
</head>
<body>

<div class="container">
  <div class="form-section">
    <div class="row">

      <div class="form-group">
        <label>Rencana kerja hari ini</label>
        <textarea id="rencanaKerja"></textarea>
      </div>

    </div>
    
    <div class="row">

      <div class="form-group">
        <label>Tanggal</label>
        <input type="date" id="tanggal">
      </div>

      <div class="form-group">
        <label>Waktu</label>

        <div class="time-range">
            <input type="time" id="waktuMulai">
            <span>s/d</span>
            <input type="time" id="waktuSelesai">
        </div>
      </div>

    </div>

    <div class="form-group">
      <label>Metode Kerja/IK yang dibahas</label>
      <textarea id="metodekerja"></textarea>
    </div>

    <div class="form-group">
      <label>JSA yang Dibacakan</label>
      <textarea id="jsa">
      </textarea>
    </div>

    <div class="form-group">
      <label>Izin Kerja yang Berlaku</label>

      <div class="check-grid">

        <label>
          <input type="checkbox" class="izinkerja" value="Kerja Umum">
          Kerja Umum
        </label>

        <label>
          <input type="checkbox" class="izinkerja" value="Kerja Panas">
          Kerja Panas
        </label>

        <label>
          <input type="checkbox" class="izinkerja" value="Kerja Radiografi">
          Kerja Radiografi
        </label>

        <label>
          <input type="checkbox" class="izinkerja" value="Kerja Penggalian">
          Kerja Penggalian
        </label>

        <label>
          <input type="checkbox" class="izinkerja" value="Kerja Sandblasting">
          Kerja Sandblasting
        </label>

        <label>
          <input type="checkbox" class="izinkerja" value="Kerja Pengangkatan">
          Kerja Pengangkatan
        </label>

        <label>
          <input type="checkbox" class="izinkerja" value="Kerja Listrik Berenergi">
          Kerja Listrik Berenergi
        </label>

        <label>
          <input type="checkbox" class="izinkerja" value="Kerja memasuki ruang terbatas">
          Kerja memasuki ruang terbatas
        </label>
        
        <label>
          <input type="checkbox" class="izinkerja" value="Kerja di ketinggian">
          Kerja di ketinggian
        </label>

      </div>
    </div>

    <div class="form-group">
      <label>Alat Berat dan Alat Bertenaga Listrik yang Digunakan</label>
      <textarea id="alat"></textarea>
    </div>

    <div class="form-group">
      <label>Penjelasan Lain</label>
      <textarea id="penjelasan"></textarea>
    </div>

   <div class="form-group">
      <label>APD yang dipakai</label>

      <div class="check-grid">

        <label>
          <input type="checkbox" class="APDyangdipakai" value="Helm">
          Helm
        </label>

        <label>
          <input type="checkbox" class="APDyangdipakai" value="Sepatu Safety">
          Sepatu Safety
        </label>

        <label>
          <input type="checkbox" class="APDyangdipakai" value="Rompi">
          Rompi
        </label>

        <label>
          <input type="checkbox" class="APDyangdipakai" value="Kacamata">
          Kacamata
        </label>

        <label>
          <input type="checkbox" class="APDyangdipakai" value="Sarung Tangan">
          Sarung Tangan
        </label>

        <label>
          <input type="checkbox" class="APDyangdipakai" value="Penutup Telinga">
          Penutup Telinga
        </label>

        <label>
          <input type="checkbox" class="APDyangdipakai" value="Masker">
          Masker
        </label>

        <label>
          <input type="checkbox" class="APDyangdipakai" value="Body Harness">
          Body Harness
        </label>

        <label>
          <input type="checkbox" class="APDyangdipakai" value="Topeng Las">
          Topeng Las
        </label>

      </div>
    </div>

    <div class="form-group">
      <label>Persyaratan APD Tambahan</label>
      <textarea id="APDtambahan"></textarea>
    </div>

    <div class="person-section">

      <h3>Pekerja</h3>

      <button onclick="openFaceID('worker')">
        Tambah Pekerja
      </button>

      <table id="workerTable">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Jabatan</th>
            <th class="faceid-col">Face ID</th>
            <th class="aksi-col">Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    </div>

    <div class="person-section">

      <h3>Petugas Pengawas</h3>

      <button onclick="openFaceID('supervisor')">
        Tambah Petugas
      </button>

      <table id="supervisorTable">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Jabatan</th>
            <th class="faceid-col">Face ID</th>
            <th class="aksi-col">Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    </div>

    <div class="button-grup">
      <button class="pdf-button" onclick="previewPDF()">
        VIEW PDF
      </button>
      <button class="submit-button" onclick="submitForm()">
        SUBMIT
      </button>
    </div>

  </div>

  <div class="preview-section">

    <canvas id="pdfCanvas"></canvas>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>

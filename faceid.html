<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Face ID Toolbox</title>

  <script src="face-api.min.js"></script>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:420px;
      background:white;
      border-radius:16px;
      padding:20px;
      box-shadow:0 4px 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    h2{
      margin-bottom:15px;
    }

    .camera-box{
      position:relative;
      width:100%;
      height:320px;
      border:3px solid #333;
      border-radius:12px;
      overflow:hidden;
      background:black;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    canvas{
      position:absolute;
      top:0;
      left:0;
    }

    .face-guide{
      position:absolute;
      border:3px solid #00ff00;
      width:180px;
      height:220px;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      border-radius:20px;
      pointer-events:none;
    }

    .info{
      margin-top:15px;
      text-align:left;
      background:#f9f9f9;
      padding:12px;
      border-radius:10px;
    }

    .info p{
      margin:6px 0;
    }

    .success{
      margin-top:15px;
      font-size:60px;
      color:green;
      display:none;
    }

    .status{
      margin-top:10px;
      font-weight:bold;
      color:#444;
    }

  </style>

</head>
<body>

<div class="container">

  <h2>Face ID Pekerja</h2>

  <div class="camera-box">

    <video id="video" autoplay muted></video>

    <canvas id="overlay"></canvas>


    <div class="face-guide"></div>

  </div>

  <div class="status" id="statusText">
    Menunggu deteksi wajah...
  </div>

  <button id="switchCameraBtn">
        Switch Camera
  </button>

  <div class="info">

    <p><b>Nama:</b> <span id="nama">-</span></p>

    <p><b>Jabatan:</b> <span id="jabatan">-</span></p>

  </div>

  <div class="success" id="successIcon">
    ✓
  </div>

</div>

<script src="faceid.js"></script>

</body>
</html>
